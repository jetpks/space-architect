name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruby-tests:
    runs-on: ubuntu-latest
    env:
      BUNDLE_PATH: vendor/bundle
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v6
        with:
          path: vendor/bundle
          key: bundle-ruby-${{ hashFiles('Gemfile.lock') }}
          restore-keys: bundle-ruby-
      - run: bundle install
      - run: bundle exec rake test 2>&1 | tee /tmp/rake-test.log
      - if: always()
        name: Summary
        run: |
          echo "## Ruby tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '^\d+ runs,' /tmp/rake-test.log >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  security-audit:
    runs-on: ubuntu-latest
    env:
      BUNDLE_PATH: vendor/bundle
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v6
        with:
          path: vendor/bundle
          key: bundle-ruby-${{ hashFiles('Gemfile.lock') }}
          restore-keys: bundle-ruby-
      - run: bundle install
      - run: gem install bundler-audit
      - run: bundler-audit check --update 2>&1 | tee /tmp/audit.log
      - if: always()
        name: Summary
        run: |
          echo "## Security audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -5 /tmp/audit.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
