name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and publish gem
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
      id-token: write # OIDC token for RubyGems trusted publishing
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: jdx/mise-action@v4

      - name: Build gem
        run: |
          gem build space-architect.gemspec
          mkdir -p pkg/
          mv *.gem pkg/

      # Trusted publishing: no API token. Auth is a short-lived OIDC
      # credential minted at run time, scoped to this repo + workflow.
      # Requires a (pending) trusted publisher configured on rubygems.org.
      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@v2.1.0

      - name: Publish to RubyGems
        run: gem push pkg/space-architect-*.gem

      - name: Smoke-test the published gem
        run: |
          version="${GITHUB_REF_NAME#v}"
          for attempt in 1 2 3 4 5; do
            gem install space-architect --version "$version" && break
            echo "not indexed yet (attempt $attempt) — retrying in 15s"
            sleep 15
          done
          architect version

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: pkg/*.gem
          generate_release_notes: true
          # Prerelease tags (e.g. v2.0.0.rc1) must not be published as "latest".
          prerelease: ${{ contains(github.ref_name, '.rc') || contains(github.ref_name, '.beta') || contains(github.ref_name, '.alpha') || contains(github.ref_name, '.pre') || contains(github.ref_name, '-') }}
